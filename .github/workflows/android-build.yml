name: Build Android APK (GNSS Plugin)

on:
  push:
    branches: [dev, feature/gnss-plugin]
    tags:
      - 'v*'
    paths:
      - 'native/**'
      - 'index.html'
      - 'js/**'
      - 'css/**'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install native project dependencies
        working-directory: native
        run: npm install --no-audit --no-fund

      - name: Build GNSS plugin (TypeScript → JS)
        working-directory: native/gnss-plugin
        run: npx tsc 2>/dev/null; npx tsc || true
        # 重试一次：第一次可能因 @capacitor/core 未解析失败

      - name: Add Android platform
        working-directory: native
        run: npx cap add android || true

      - name: Copy web assets to native/web/
        run: |
          mkdir -p native/web
          cp -R index.html js css native/web/
          ls -la native/web/

      - name: Sync web assets to Android project
        working-directory: native
        run: npx cap sync android

      - name: Integrate local GNSS plugin into Android project
        working-directory: native
        run: |
          # ── 1. Add module include to settings.gradle ──
          echo "" >> android/settings.gradle
          echo "// GNSS data plugin" >> android/settings.gradle
          echo "include ':gnss-data-plugin'" >> android/settings.gradle
          echo "project(':gnss-data-plugin').projectDir = new File('../gnss-plugin/android')" >> android/settings.gradle

          # ── 2. Add dependency to app/build.gradle ──
          # Insert after the capacitor-android dependency line
          sed -i "s|implementation project(':capacitor-android')|implementation project(':capacitor-android')\n    implementation project(':gnss-data-plugin')|" android/app/build.gradle

          echo "--- settings.gradle (tail) ---"
          tail -5 android/settings.gradle

          echo "--- app/build.gradle dependencies ---"
          grep -A2 "gnss-data-plugin" android/app/build.gradle || echo "(checking insert location)"

      - name: Ensure location permissions in app manifest
        working-directory: native
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add GPS feature if missing
          if ! grep -q "android.hardware.location.gps" "$MANIFEST"; then
            sed -i '/<\/manifest>/i \ \ \ \ <uses-feature android:name="android.hardware.location.gps" />' "$MANIFEST"
            echo "+ Added GPS feature to manifest"
          fi
          # Add ACCESS_FINE_LOCATION if missing
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i '/<\/manifest>/i \ \ \ \ <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "$MANIFEST"
            echo "+ Added ACCESS_FINE_LOCATION to manifest"
          fi

      - name: Build debug APK
        working-directory: native/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify GNSS plugin classes in APK
        working-directory: native
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "⚠️ APK not found at $APK — skipping verification"
            echo "::notice title=GNSS Verify::APK not found, skipping class verification"
            exit 0
          fi
          # Unzip and check for GNSS data plugin class
          unzip -l "$APK" 2>/dev/null | grep -q "gnssdata" || true
          if unzip -l "$APK" 2>/dev/null | grep -qi "GnssData"; then
            echo "## ✅ GNSS plugin classes verified in APK" >> $GITHUB_STEP_SUMMARY
            echo "Found GnssData class in APK" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ GNSS plugin classes NOT found in APK" >> $GITHUB_STEP_SUMMARY
            echo "The plugin may not have been linked into the build." >> $GITHUB_STEP_SUMMARY
            echo "Check the Integrate step logs for insertion errors." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: circlemap-gnss-debug
          path: native/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Publish to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Circlemap ${{ github.ref_name }}
          body: |
            ## Circlemap ${{ github.ref_name }}

            ### 包含
            - 腾讯地图同心圆（Canvas 叠加层）
            - GNSS 卫星数据显示（GPS/北斗/GLONASS/Galileo）
            - 轨迹记录 + GPX 导出
            - 深色/浅色主题

            ### 安装
            下载 APK 直接安装到 Android 设备。
          files: native/android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true

      - name: Summarize APK info
        working-directory: native
        run: |
          APK_PATH="android/app/build/outputs/apk/debug"
          if [ -d "$APK_PATH" ]; then
            echo "## ✅ APK built successfully" >> $GITHUB_STEP_SUMMARY
            for f in "$APK_PATH"/*.apk; do
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
              echo "- \`$(basename "$f")\` — ${SIZE_MB}MB" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "## ❌ APK not found" >> $GITHUB_STEP_SUMMARY
          fi
