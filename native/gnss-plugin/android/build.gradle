apply plugin: 'com.android.library'

android {
    namespace 'com.hzr.circlemap.plugins.gnss'
    compileSdk 36

    defaultConfig {
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "0.0.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.getcapacitor:capacitor-android:8.+"
}
