apply plugin: 'com.android.library'

android {
    namespace 'com.hzr.circlemap.plugins.gnss'
    compileSdk 36

    defaultConfig {
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "0.0.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // 使用 project 引用而非 Maven 坐标——capacitor-android 在父项目中作为子模块引入
    implementation project(':capacitor-android')
}
